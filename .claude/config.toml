# Codex 전역 MCP 서버 구성
[mcp.servers.windows-computer-use]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-computer-use"]
# 만약 파이썬(uvx/pip) 기반 커스텀 툴을 쓰셨다면 아래와 같이 등록합니다.
# command = "uvx"
# args = ["실행할-mcp-패키지명"]

[mcp.settings]
# GUI 제어(Computer Use) 시 매번 발생하는 가상 도구 실행 승인 팝업을 무시하고 
# 완전 무인 자동화를 구현하려면 아래 옵션을 true로 설정합니다.
enable_all_tools_auto_approval = true
