prompt = "매일 다음 키워드군에서 하나의 주제를 골라 LinkedIn 게시용 한국어 글과 참조 이미지를 함께 작성한다. 게시 위치는 LinkedIn Windows 앱이며, 필요 시 참고 URL은 https://www.linkedin.com/feed/ 이다. 사용자는 LinkedIn Windows 앱에 이미 로그인되어 있다고 확인했다. 키워드군: Marine, PLM, Digital Twin, AVEVA, Engineering Consultant, Business Development, Solution Architect, Technical Sales, Defense & Shipbuilding, Global Account, HART, Control Valve, Shipbuilding Data Integration. 하루에 하나의 명확한 주제만 다루고, 전날과 다른 관점으로 작성한다.\n\n게시글 형식: LinkedIn에 바로 게시 가능한 형태로 제목/첫 문장 훅, 3-5문단 본문, 실무 적용 포인트 3개, 관련 해시태그 5-8개로 구성한다. 독자는 조선/방산/해양 엔지니어링, PLM/디지털 트윈, 기술영업 및 솔루션 아키텍처에 관심 있는 전문가로 가정한다. 과장 광고보다 실무 인사이트 중심으로 작성한다.\n\n참조 이미지 형식: 매일 선택한 주제를 이해하기 쉽게 설명하는 1장의 전문적인 LinkedIn용 참조 그림을 함께 만든다. 기본 스타일은 조선/해양 엔지니어링과 디지털 전환 맥락에 맞는 깔끔한 비즈니스 인포그래픽, 개념 아키텍처 다이어그램, 데이터 흐름도, 또는 디지털 트윈 운영 화면 느낌의 시각 자료로 한다. 권장 비율은 LinkedIn 피드에 적합한 정사각형 또는 가로형이며, 텍스트가 필요하면 아주 짧은 핵심 라벨만 사용하고, 작은 글씨와 복잡한 표는 피한다. AVEVA 등 상표는 설명 목적의 텍스트 언급은 가능하나 공식 로고를 임의로 생성하거나 오해를 줄 수 있는 브랜드 이미지는 사용하지 않는다. 이미지에는 워터마크, 허위 인증 마크, 과도한 광고 문구를 넣지 않는다. 이미지 생성 도구가 제공되면 실제 이미지 파일을 생성하고, 파일명을 날짜와 주제가 드러나게 저장한 뒤 LinkedIn 게시 시 첨부한다. 이미지 생성 또는 첨부가 불가능하면 현재 스레드에 최종 게시문과 함께 이미지 생성 프롬프트/구성 설명을 출력하여 사용자가 수동으로 생성 또는 첨부할 수 있게 한다.\n\n비밀번호나 Google 인증정보를 요청하거나 저장하거나 대신 입력하지 않는다. LinkedIn Windows 앱이 설치되어 있고 로그인 세션이 유지되어 있으며 데스크톱/앱 자동화 권한이 제공되는 경우, LinkedIn Windows 앱을 열어 새 게시글 작성 화면에 최종 게시문을 입력하고 생성한 참조 이미지를 첨부한 뒤 게시를 시도한다. 로그인 만료, Google 계정 선택, 2단계 인증, 계정 보안 확인, CAPTCHA, 이미지 첨부 실패, 게시 전 사용자 확인 등 사용자 개입이 필요한 화면이 나오면 즉시 중단하고 현재 스레드에 최종 게시문, 참조 이미지 파일 또는 이미지 프롬프트, 필요한 사용자 조치를 알려준다. LinkedIn Windows 앱 접근, 직접 게시 권한, 로그인된 세션, 이미지 생성, 또는 이미지 첨부 기능이 제공되지 않는 경우에는 현재 스레드에 최종 게시문과 참조 이미지/이미지 프롬프트를 출력하고, 사용자가 LinkedIn Windows 앱에 붙여넣고 첨부해 게시할 수 있게 한다."
