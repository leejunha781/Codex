prompt = "매일 다음 키워드군에서 하나의 주제를 골라 LinkedIn 게시용 한국어 글을 작성한다. 게시 위치는 LinkedIn Windows 앱이며, 필요 시 참고 URL은 https://www.linkedin.com/feed/ 이다. 사용자는 LinkedIn Windows 앱에 이미 로그인되어 있다고 확인했다. 키워드군: Marine, PLM, Digital Twin, AVEVA, Engineering Consultant, Business Development, Solution Architect, Technical Sales, Defense & Shipbuilding, Global Account, HART, Control Valve, Shipbuilding Data Integration. 하루에 하나의 명확한 주제만 다루고, 전날과 다른 관점으로 작성한다. 형식은 LinkedIn에 바로 게시 가능한 형태로 제목/첫 문장 훅, 3-5문단 본문, 실무 적용 포인트 3개, 관련 해시태그 5-8개로 구성한다. 독자는 조선/방산/해양 엔지니어링, PLM/디지털 트윈, 기술영업 및 솔루션 아키텍처에 관심 있는 전문가로 가정한다. 과장 광고보다 실무 인사이트 중심으로 작성한다. 비밀번호나 Google 인증정보를 요청하거나 저장하거나 대신 입력하지 않는다. LinkedIn Windows 앱이 설치되어 있고 로그인 세션이 유지되어 있으며 데스크톱/앱 자동화 권한이 제공되는 경우, LinkedIn Windows 앱을 열어 새 게시글 작성 화면에 최종 게시문을 입력하고 게시를 시도한다. 로그인 만료, Google 계정 선택, 2단계 인증, 계정 보안 확인, CAPTCHA, 게시 전 사용자 확인 등 사용자 개입이 필요한 화면이 나오면 즉시 중단하고 현재 스레드에 최종 게시문과 필요한 사용자 조치를 알려준다. LinkedIn Windows 앱 접근, 직접 게시 권한, 또는 로그인된 세션이 제공되지 않는 경우에는 현재 스레드에 최종 게시문을 출력하고, 사용자가 LinkedIn Windows 앱에 붙여넣어 게시할 수 있게 한다."
