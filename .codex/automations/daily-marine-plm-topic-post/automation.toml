prompt = "Every day, choose one topic from the keyword group below and create an English LinkedIn post with one supporting reference image. The posting destination is the LinkedIn Windows app; the reference URL, if needed, is https://www.linkedin.com/feed/. The user confirmed that the LinkedIn Windows app is already logged in, so skip any login workflow and do not attempt Google/LinkedIn login. Keyword group: Marine, PLM, Digital Twin, AVEVA, Engineering Consultant, Business Development, Solution Architect, Technical Sales, Defense & Shipbuilding, Global Account, HART, Control Valve, Shipbuilding Data Integration. Cover only one clear topic per day and use a different angle from previous days.\n\nPost language: English only. Write the LinkedIn post body, hook, practical points, and hashtags in professional, natural English. Do not write the final LinkedIn post in Korean unless the user explicitly changes the language again.\n\nPost format: Make it ready to paste or publish on LinkedIn. Include a strong title or opening hook, 3-5 short body paragraphs, 3 practical application points, and 5-8 relevant hashtags. Assume the audience is professionals interested in shipbuilding, defense, marine engineering, PLM, digital twin, technical sales, and solution architecture. Keep the tone practical and insight-led, not exaggerated or advertisement-like.\n\nReference image format: Create one professional LinkedIn-ready reference image that visually summarizes the core message of the post at a glance. The image should be concise, compressed, and immediately understandable: one main idea, simple visual hierarchy, large readable elements, minimal short English labels, and no dense tables or small text. The image should not merely decorate the post; it must capture the post's key concept in a shortened visual form. The default visual style should be a clean business infographic, conceptual architecture diagram, data flow diagram, or digital twin operations screen suited to shipbuilding/marine engineering and digital transformation. Prefer a square or landscape ratio suitable for the LinkedIn feed. AVEVA and other trademarks may be mentioned in explanatory text where appropriate, but do not generate official logos or any misleading brand imagery. Do not include watermarks, fake certification marks, or excessive promotional copy. Add a subtle handwritten-style English signature reading exactly \"Joonha Lee\" in the lower-right corner of the image. The signature should look like a personal cursive signature, remain small and tasteful, and not interfere with the infographic content.\n\nSave the generated image in the workspace outputs folder with a filename that includes the date and topic. Also save the final English post as a markdown file in the same outputs folder for backup. If image generation or attachment is not possible, output the final post plus the image prompt/composition notes in the current thread so the user can generate or attach it manually.\n\nDo not ask for, store, or enter passwords or Google credentials. Since the user confirmed the LinkedIn Windows app is already logged in, open the app and proceed directly to the LinkedIn feed. Do not navigate through a login process. On the LinkedIn feed, begin posting by selecting the visible \"Start a post\" element located near the upper center of the feed page. Prefer the exact accessibility label or visible text \"Start a post\". If accessibility labels are unavailable, use the visually identified upper-center \"Start a post\" element, then verify that the post composer opens before entering content.\n\nLinkedIn image attachment workflow: after the composer opens, enter the final English post text into the \"Share your thoughts...\" area. Then click the picture/image icon shown near the lower middle of the composer. In the Windows Open file dialog, navigate to the workspace outputs folder where the generated LinkedIn image was saved, select the intended image file for the current date/topic, and click \"Open\". After the image editor/preview screen appears, verify that the selected image is displayed, then click \"Next\". After returning to the final LinkedIn composer with the image attached and the post text present, stop before clicking the final \"Post\" control and notify the user that the post is ready for final confirmation.\n\nBecause publishing to LinkedIn is external representational communication, do not click the final \"Post\" control without action-time user confirmation. If a future run reaches the final \"Post\" screen, report that the LinkedIn post is ready and ask the user to confirm posting. If the user provides confirmation in that moment and policy allows, click \"Post\" to finish. If the user is unavailable, leave the composer prepared and report the final English post, reference image file, and required action in the current thread.\n\nIf the app unexpectedly shows a logged-out state, Google account selection, two-factor authentication, account security check, CAPTCHA, or any other login/security screen, stop immediately and report the issue with the final English post and reference image. If image attachment failure, file dialog navigation failure, final posting confirmation, or any other user-intervention screen appears, stop immediately and report the final English post, reference image file or image prompt, and required user action in the current thread. If LinkedIn Windows app access, logged-in session, image generation, or image attachment is unavailable, output the final English post and reference image/image prompt in the current thread so the user can paste and attach them in the LinkedIn Windows app."
