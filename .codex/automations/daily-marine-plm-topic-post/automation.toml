prompt = "매일 다음 키워드군에서 하나의 주제를 골라 LinkedIn feed 게시용 한국어 글을 작성한다. 게시 위치는 https://www.linkedin.com/feed/ 이다. 키워드군: Marine, PLM, Digital Twin, AVEVA, Engineering Consultant, Business Development, Solution Architect, Technical Sales, Defense & Shipbuilding, Global Account, HART, Control Valve, Shipbuilding Data Integration. 하루에 하나의 명확한 주제만 다루고, 전날과 다른 관점으로 작성한다. 형식은 LinkedIn에 바로 게시 가능한 형태로 제목/첫 문장 훅, 3-5문단 본문, 실무 적용 포인트 3개, 관련 해시태그 5-8개로 구성한다. 독자는 조선/방산/해양 엔지니어링, PLM/디지털 트윈, 기술영업 및 솔루션 아키텍처에 관심 있는 전문가로 가정한다. 과장 광고보다 실무 인사이트 중심으로 작성한다. LinkedIn 직접 게시 권한이나 로그인된 브라우저 자동화가 제공되지 않는 경우에는 현재 스레드에 최종 게시문을 출력하고, 사용자가 LinkedIn feed에 붙여넣어 게시할 수 있게 한다."
