name = "Daily Marine PLM LinkedIn Chrome Post"
prompt = "Every day, choose one topic from the keyword group below and create an English LinkedIn post with one supporting reference image. The posting destination is Chrome at https://www.linkedin.com/feed/. Do not use the LinkedIn Windows app. Use Chrome and the LinkedIn feed page for the posting workflow. The user previously confirmed LinkedIn is logged in, so use an existing logged-in Chrome session if available; skip any login workflow and do not attempt Google/LinkedIn login. Keyword group: Marine, PLM, Digital Twin, AVEVA, Engineering Consultant, Business Development, Solution Architect, Technical Sales, Defense & Shipbuilding, Global Account, HART, Control Valve, Shipbuilding Data Integration, Space, Satellite, satellite communication, satellite communications, HF communication, VHF communication, UHF communication, maritime communications, defense communications, ship-to-shore communications, satellite-enabled marine operations. Cover only one clear topic per day and use a different angle from previous days. Topics may connect marine/shipbuilding engineering with space, satellite communication, and HF/VHF/UHF communication systems where relevant.\n\nPost language: English only. Write the LinkedIn post body, hook, practical points, and hashtags in professional, natural English. Do not write the final LinkedIn post in Korean unless the user explicitly changes the language again.\n\nPost format: Make it ready to publish on LinkedIn. Include a strong title or opening hook, 3-5 short body paragraphs, 3 practical application points, and 5-8 relevant hashtags. Assume the audience is professionals interested in shipbuilding, defense, marine engineering, PLM, digital twin, satellite communication, space-enabled communications, HF/VHF/UHF communication, technical sales, and solution architecture. Keep the tone practical and insight-led, not exaggerated or advertisement-like.\n\nReference image format: Create one professional LinkedIn-ready reference image that visually summarizes the core message of the post at a glance. The image should be concise, compressed, and immediately understandable: one main idea, simple visual hierarchy, large readable elements, minimal short English labels, and no dense tables or small text. The image should not merely decorate the post; it must capture the post's key concept in a shortened visual form. The default visual style should be a clean business infographic, conceptual architecture diagram, data flow diagram, digital twin operations screen, or communication architecture visual suited to shipbuilding/marine engineering, defense, satellite communication, space-enabled operations, HF/VHF/UHF communications, and digital transformation. Prefer a square or landscape ratio suitable for the LinkedIn feed. AVEVA and other trademarks may be mentioned in explanatory text where appropriate, but do not generate official logos or any misleading brand imagery. Do not include watermarks, fake certification marks, or excessive promotional copy. Add a subtle handwritten-style English signature reading exactly \"Joonha Lee\" in the lower-right corner of the image. The signature should look like a personal cursive signature, remain small and tasteful, and not interfere with the infographic content.\n\nSave the generated image in the workspace outputs folder with a filename that includes the date and topic. Also save the final English post as a markdown file in the same outputs folder for backup. If image generation or attachment is not possible, output the final post plus the image prompt/composition notes in the current thread so the user can generate or attach it manually.\n\nChrome LinkedIn posting workflow based on the user's screenshots:\n1. Open or focus Chrome and navigate to https://www.linkedin.com/feed/.\n2. If the page is already logged in, proceed. Do not perform a login workflow. If LinkedIn shows a logged-out state, Google account selection, two-factor authentication, account security check, CAPTCHA, or any other login/security screen, stop immediately and report the issue with the final English post and reference image.\n3. On the LinkedIn feed page, locate the visible \"Start a post\" text in the middle area of the screen and select it to open the post composer.\n4. In the composer, enter the generated English LinkedIn post content into the \"Share your thoughts...\" text area.\n5. After the post text is entered, click the picture/image icon shown near the lower middle of the composer to start adding the generated image.\n6. When the image upload panel appears, click the \"Upload from computer\" button.\n7. In the Windows Open file dialog, navigate to the workspace outputs folder where the generated LinkedIn image was saved, select the intended image file for the current date/topic, and click \"Open\".\n8. When the LinkedIn image editor/preview screen appears and the selected image is visible, click \"Next\".\n9. When the final LinkedIn composer returns with the post text and attached image visible, stop before clicking \"Post\" unless action-time user confirmation is already available in the current interaction.\n10. If the user confirms at that moment that the prepared LinkedIn post should be published, click \"Post\" to finish the LinkedIn posting.\n\nBecause publishing to LinkedIn is external representational communication, do not click the final \"Post\" control without action-time user confirmation. If a future run reaches the final \"Post\" screen and the user is not actively available to confirm, leave the composer prepared and report that the post is ready for final posting. If the user gives action-time confirmation and policy allows, click \"Post\" to complete the posting.\n\nIf image attachment failure, \"Upload from computer\" is not visible, file dialog navigation failure, final posting confirmation, or any other user-intervention screen appears, stop immediately and report the final English post, reference image file or image prompt, and required user action in the current thread. If Chrome access, LinkedIn logged-in session, image generation, or image attachment is unavailable, output the final English post and reference image/image prompt in the current thread so the user can paste and attach them in Chrome on LinkedIn."
