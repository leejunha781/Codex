prompt = "Quiet daily LinkedIn workflow. Use minimal tokens: no progress narration, no broad research unless necessary, concise final status only.\n\nTask: choose one clear English LinkedIn topic from this group, using a different angle from prior runs when visible: Marine, Marine PLM, Plant PLM, Digital Twin, Engineering Consultant, Business Development, Solution Architect, Technical Sales, Defense & Shipbuilding, Global Account, HART, Control Valve, Shipbuilding Data Integration, Communication System Integration, System Integration, Space, Satellite, satellite communication(s), HF/VHF/UHF communication, maritime/defense/ship-to-shore communications, satellite-enabled marine operations, AVEVA, Dassault Systèmes Siemens Digital Industries Software, Hexagon PPM, Aras PLM, Bentley Systems, Python boot camp, Python Engineering, Python Communication, Python Satellite Communication, Python Control, Python RF Communication Automation, Python RF Communication Analysis Automation, Python Engineering Automation, Python Engineering Analysis Automation, Python Communication Automation, Vibe Coding, Beyond Vibe Coding, Beyond Vibe Coding: From Coder to AI-Era Developer, 바이브 코딩 너머 개발자 생존법, Lead Developer Career Guide, AI-era developer survival, AI-assisted development workflow, AI coding governance, engineering ownership, lead developer career, technical leadership, developer career growth, architecture mentoring delivery responsibility.\n\nNew AI-era developer leadership angle: periodically connect Marine PLM, digital thread, shipbuilding integration, Python automation, and communication-system work with the question of how developers survive and lead in the AI era. Use the following ideas when relevant: AI can generate code, scripts, dashboards, and automation faster, but professional developers still own debugging, validation, architecture, maintainability, security, lifecycle governance, and post-release support. *Beyond Vibe Coding* can be used as a reference for moving from prompt-driven coding to AI-era engineering ownership. *Lead Developer Career Guide* can be used as a reference for moving from individual contribution to technical leadership, mentoring, architecture decisions, stakeholder communication, and delivery accountability. Keep these references educational and career-oriented, not promotional or book-review-only.\n\nWhen choosing this AI-era angle, make the Marine PLM connection concrete: examples may include AI-generated PLM data-quality scripts, Python automation for BOM or tag completeness checks, interface readiness validators, digital-thread dashboards, shipyard integration utilities, communication-system test automation, or engineering reporting tools. Emphasize that AI can accelerate initial implementation, but Marine PLM and shipbuilding systems require traceability, configuration control, validation, cross-system integration, and accountable technical leadership.\n\nCreate: 1) English-only LinkedIn post with a strong hook/title, 3-5 short paragraphs, 3 practical application points, and 5-8 hashtags. Tone: professional, practical, domain-specific, insight-led, and not promotional. Make the post consultative and decision-oriented: connect customer pain, data ownership, integration risk, proof gates, adoption responsibility, and business/engineering outcomes. Apply purposeful emojis to the title and key sections such as the application-point heading and practical takeaway; use them sparingly and professionally, not decoratively. 2) One LinkedIn-ready reference image.\n\nPost depth rule: avoid generic PLM or platform-benefit language. Each post must include at least one concrete marine/shipbuilding execution context such as BOM maturity, design-change control, supplier package readiness, class/test records, handover evidence, CAD/ERP/MES/document-control interfaces, control-valve commissioning evidence, RF/SATCOM/HF/VHF/UHF validation, or shipyard adoption gates. The post should read like a practical account, solution-architecture, or engineering-consulting insight, not a high-level marketing summary.\n\nImage style rule: prefer a detailed but compressed technical infographic similar to an engineering solution overview poster: clear title/subtitle, 3-4 numbered blocks, compact bullets, icons or simple schematics, a central system/architecture visual, one bottom checklist or takeaway strip, and strong visual hierarchy. It should explain the concept in one glance while still carrying useful detail. Avoid vague decorative labels, stock-photo-only images, and purely atmospheric visuals. Use English-only text, concise phrases, and deterministic/local text overlay when possible for clean typography.\n\nVisual richness rule: avoid flat, plain, or overly dry diagrams. Combine the compressed infographic layout with a natural, premium, non-AI-looking visual foundation when appropriate: realistic maritime/shipyard/operations-room imagery, cinematic but believable lighting, rich blue/teal/amber contrast, subtle depth, polished engineering dashboard aesthetics, and vivid but restrained highlights. The image should feel natural, impressive, and colorful, not plastic, generic, or obviously AI-generated.\n\nProfessional mini-image rule: when the design uses images inside cards or modules, use small, topic-relevant, professional-looking real/photo-like crops from user-provided, licensed, local, or otherwise appropriate source images. Keep these photos as compact thumbnails that support the explanation; do not let them dominate the layout, create nested thumbnail boxes, collide with labels, or obscure text. Prefer real equipment, dashboard, operations-room, shipyard, vessel, chart, or architecture-detail crops over standalone cartoon symbols when a realistic crop communicates the idea better.\n\nImage text-fit rule: all visible text must stay inside its intended background shape, label chip, panel, or safe area. Before finalizing, measure text width/height when adding labels locally; use generous horizontal padding, enlarge the shape, wrap text, shorten the label, or reduce font size until it fits. No text may cross outside the rectangle/chip/panel behind it. Treat overflow as a failed image QA check and re-render/fix before posting.\n\nImage leader-line rule: do not draw connector/leader lines unless each line clearly terminates on the exact visible object or visual feature named by its label. If there is any ambiguity, omit the line and place the label near the target instead. Treat wrong direction, floating endpoints, mismatched targets, or unclear label-to-object mapping as failed image QA and fix before posting.\n\nImage overlap QA rule: before finalizing, inspect the finished image at full size. Check for content running outside panels, photo thumbnails overlapping labels, arrows crossing foreground text, clipped titles/subtitles, same-level cards with inconsistent spacing or baselines, chart-label collisions, and background graphics bleeding through content panels. If any issue is visible, adjust the layout and re-render until the image passes. Record the final QA result in the run summary or automation memory.\n\nSave the final image and markdown post only to C:\\Users\\namma\\Documents\\Codex\\YYYY-MM-DD\\<topic-slug> with date/topic filenames. Do not create a separate direct-upload copy in any generated_images folder. When uploading to LinkedIn, use the final image path from this outputs folder directly in the Windows Open file dialog.\n\nPost via LinkedIn Windows app only, using existing logged-in session. Never use Chrome and never attempt login, Google selection, credentials, 2FA, CAPTCHA, or security checks; stop and report concise blocker plus post/image path if any appear.\n\nWorkflow: open/focus LinkedIn app; click Start a post; enter post in Share your thoughts editor, using click/type_text if set_value fails; click Add media; in Windows Open dialog enter the full final image path from the outputs folder in File name and press Open/Return; when image preview/editor appears click Next; verify final composer has text, image preview, and enabled Post button.\n\nDo not click final Post without action-time user confirmation in the current interaction. If confirmed, click Post and verify success. If not confirmed, leave composer prepared and report only: topic, post markdown path, image path, and \"ready for final posting\". On any failure, stop and report concise blocker plus final post and image path or image prompt."
