prompt = "Every run, choose one clear topic from this keyword group and create a ready-to-publish English LinkedIn post with one supporting reference image: Marine, PLM, Digital Twin, AVEVA, Engineering Consultant, Business Development, Solution Architect, Technical Sales, Defense & Shipbuilding, Global Account, HART, Control Valve, Shipbuilding Data Integration, Space, Satellite, satellite communication, satellite communications, HF communication, VHF communication, UHF communication, maritime communications, defense communications, ship-to-shore communications, satellite-enabled marine operations. Cover only one topic per day and use a different angle from previous days when run history is available. Topics may connect marine/shipbuilding engineering with space, satellite communication, and HF/VHF/UHF communication systems where relevant.\n\nWrite the final LinkedIn post in English only unless the user explicitly changes the language. Make it ready to publish on LinkedIn with a strong title or opening hook, 3-5 short body paragraphs, 3 practical application points, and 5-8 relevant hashtags. Target professionals interested in shipbuilding, defense, marine engineering, PLM, digital twin, satellite communication, space-enabled communications, HF/VHF/UHF communication, technical sales, and solution architecture. Keep the tone practical and insight-led, not exaggerated or advertisement-like.\n\nCreate one professional LinkedIn-ready reference image that visually summarizes the core message at a glance. The image should be concise, compressed, and immediately understandable: one main idea, simple visual hierarchy, large readable elements, minimal short English labels, no dense tables or small text. Use a clean business infographic, conceptual architecture diagram, data flow diagram, digital twin operations screen, or communication architecture visual suited to shipbuilding/marine engineering, defense, satellite communication, space-enabled operations, HF/VHF/UHF communications, and digital transformation. Prefer square or landscape ratio for the LinkedIn feed. AVEVA and other trademarks may be mentioned in explanatory text where appropriate, but do not generate official logos or misleading brand imagery. Do not include watermarks, fake certification marks, or excessive promotional copy. Add a subtle handwritten-style English signature reading exactly \"Joonha Lee\" in the lower-right corner of the image; it should look like a personal cursive signature, remain small and tasteful, and not interfere with the infographic.\n\nSave the generated image in the default generated-images folder for direct upload selection: C:\\Users\\namma\\.codex\\generated_images\\019eebbe-a20b-70e3-9dba-eb0f4a594ca8. Also copy it into a workspace outputs folder with a filename that includes the date and topic. Use C:\\Users\\namma\\Documents\\Codex\\YYYY-MM-DD\\<topic-slug>\\outputs for each run unless a more specific current workspace output folder already exists. Save the final English post as a markdown file in the same outputs folder for backup. If image generation or attachment is not possible, output the final post plus the image prompt/composition notes in the thread so the user can generate or attach it manually.\n\nUse the proven LinkedIn Windows app posting workflow, not Chrome. The LinkedIn Windows app is installed and already logged in. Skip all login workflows and never attempt Google/LinkedIn login or credential entry. Open or focus the LinkedIn Windows app and use the existing logged-in session. If the app unexpectedly shows logged-out state, Google account selection, 2FA, account security check, CAPTCHA, or any login/security screen, stop immediately and report the issue with the final English post and reference image.\n\nWorkflow: on the feed, click the visible \"Start a post\" control in the middle of the screen to open the Create post modal. Click the \"Share your thoughts...\" editor and enter the generated English post text. If accessibility set_value fails, use actual click plus type_text. Click the image/Add media icon near the lower area of the composer. When the Windows Open file dialog appears, skip any separate \"Upload from computer\" button workflow and work directly in the Open dialog. Select the generated image by clicking the visible File name field in the Open dialog, entering the full generated image path, and pressing Return/Open. When LinkedIn shows the image editor/preview and the selected image is visible, click \"Next\". Confirm the final composer shows the English post text and attached image preview, with the \"Post\" button enabled.\n\nBecause publishing to LinkedIn is external representational communication, do not click the final \"Post\" control without action-time user confirmation in the current interaction. If action-time confirmation is present, click \"Post\" and verify success by checking for \"Post successful\", \"View post\", or the new Joonha Lee feed post containing the generated topic text and image. If final posting confirmation is unavailable, leave the composer prepared and report that the post is ready for final posting. If image attachment failure, file dialog navigation failure, LinkedIn Windows app access issues, logged-in session issues, image generation issues, or any other user-intervention screen appears, stop immediately and report the final English post, reference image file or image prompt, and required user action."
