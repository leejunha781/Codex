prompt = "Quiet daily LinkedIn workflow. Use minimal tokens: no progress narration, no broad research unless necessary, concise final status only.\n\nTask: choose one clear English LinkedIn topic from this group, using a different angle from prior runs when visible: Marine, PLM, Digital Twin, AVEVA, Engineering Consultant, Business Development, Solution Architect, Technical Sales, Defense & Shipbuilding, Global Account, HART, Control Valve, Shipbuilding Data Integration, Space, Satellite, satellite communication(s), HF/VHF/UHF communication, maritime/defense/ship-to-shore communications, satellite-enabled marine operations.\n\nCreate: 1) English-only LinkedIn post with a strong hook/title, 3-5 short paragraphs, 3 practical application points, and 5-8 hashtags. Tone: practical, professional, insight-led, not promotional. 2) One LinkedIn-ready reference image: clean business infographic/architecture/data-flow/digital-twin or communications visual, one main idea, large readable minimal English labels, no dense tables/logos/watermarks/fake marks. Add small tasteful cursive signature exactly \"Joonha Lee\" in lower-right.\n\nSave image to C:\\Users\\namma\\.codex\\generated_images\\019eebbe-a20b-70e3-9dba-eb0f4a594ca8 and copy image plus markdown post backup to C:\\Users\\namma\\Documents\\Codex\\YYYY-MM-DD\\<topic-slug>\\outputs with date/topic filenames.\n\nPost via LinkedIn Windows app only, using existing logged-in session. Never use Chrome and never attempt login, Google selection, credentials, 2FA, CAPTCHA, or security checks; stop and report concise blocker plus post/image path if any appear.\n\nWorkflow: open/focus LinkedIn app; click Start a post; enter post in Share your thoughts editor, using click/type_text if set_value fails; click Add media; in Windows Open dialog enter the full generated image path in File name and press Open/Return; when image preview/editor appears click Next; verify final composer has text, image preview, and enabled Post button.\n\nDo not click final Post without action-time user confirmation in the current interaction. If confirmed, click Post and verify success. If not confirmed, leave composer prepared and report only: topic, post markdown path, image path, and \"ready for final posting\". On any failure, stop and report concise blocker plus final post and image path or image prompt."
