prompt = "Quiet daily LinkedIn workflow. Use minimal tokens: no progress narration, no broad research unless necessary, concise final status only.\n\nTask: choose one clear English LinkedIn topic from this group, using a different angle from prior runs when visible: Marine, PLM, Digital Twin, Engineering Consultant, Business Development, Solution Architect, Technical Sales, Defense & Shipbuilding, Global Account, HART, Control Valve, Shipbuilding Data Integration, Space, Satellite, satellite communication(s), HF/VHF/UHF communication, maritime/defense/ship-to-shore communications, satellite-enabled marine operations, AVEVA, Dassault Systèmes Siemens Digital Industries Software, Hexagon PPM, .\n\nCreate: 1) English-only LinkedIn post with a strong hook/title, 3-5 short paragraphs, 3 practical application points, and 5-8 hashtags. Tone: practical, professional, insight-led, not promotional. 2) One LinkedIn-ready reference image.\n\nImage style rule: prefer a detailed but compressed technical infographic similar to an engineering solution overview poster: clear title/subtitle, 3-4 numbered blocks, compact bullets, icons or simple schematics, a central system/architecture visual, one bottom checklist or takeaway strip, and strong visual hierarchy. It should explain the concept in one glance while still carrying useful detail. Avoid vague decorative labels, stock-photo-only images, and purely atmospheric visuals. Use English-only text, concise phrases, and deterministic/local text overlay when possible for clean typography.\n\nVisual richness rule: avoid flat, plain, or overly dry diagrams. Combine the compressed infographic layout with a natural, premium, non-AI-looking visual foundation when appropriate: realistic maritime/shipyard/operations-room imagery, cinematic but believable lighting, rich blue/teal/amber contrast, subtle depth, polished engineering dashboard aesthetics, and vivid but restrained highlights. The image should feel natural, impressive, and colorful, not plastic, generic, or obviously AI-generated.\n\nImage text-fit rule: all visible text must stay inside its intended background shape, label chip, panel, or safe area. Before finalizing, measure text width/height when adding labels locally; use generous horizontal padding, enlarge the shape, wrap text, shorten the label, or reduce font size until it fits. No text may cross outside the rectangle/chip/panel behind it. Treat overflow as a failed image QA check and re-render/fix before posting.\n\nImage leader-line rule: do not draw connector/leader lines unless each line clearly terminates on the exact visible object or visual feature named by its label. If there is any ambiguity, omit the line and place the label near the target instead. Treat wrong direction, floating endpoints, mismatched targets, or unclear label-to-object mapping as failed image QA and fix before posting.\n\nSave the final image and markdown post only to C:\\Users\\namma\\Documents\\Codex\\YYYY-MM-DD\\<topic-slug>\\outputs with date/topic filenames. Do not create a separate direct-upload copy in any generated_images folder. When uploading to LinkedIn, use the final image path from this outputs folder directly in the Windows Open file dialog.\n\nPost via LinkedIn Windows app only, using existing logged-in session. Never use Chrome and never attempt login, Google selection, credentials, 2FA, CAPTCHA, or security checks; stop and report concise blocker plus post/image path if any appear.\n\nWorkflow: open/focus LinkedIn app; click Start a post; enter post in Share your thoughts editor, using click/type_text if set_value fails; click Add media; in Windows Open dialog enter the full final image path from the outputs folder in File name and press Open/Return; when image preview/editor appears click Next; verify final composer has text, image preview, and enabled Post button.\n\nDo not click final Post without action-time user confirmation in the current interaction. If confirmed, click Post and verify success. If not confirmed, leave composer prepared and report only: topic, post markdown path, image path, and \"ready for final posting\". On any failure, stop and report concise blocker plus final post and image path or image prompt."
